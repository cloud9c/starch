name: Deploy to Production
on:
  push:
    branches: [ prod ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: starchapp.com
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /root/starch

          git fetch
          git checkout prod
          git pull

          bundle install
          rails db:migrate RAILS_ENV=production
          bundle exec rake systemd:generate
          RAILS_ENV=production bundle exec rake assets:precompile

          # Copy systemd service file
          sudo cp config/systemd/jobs.service /etc/systemd/system/
          sudo cp config/systemd/thruster.service /etc/systemd/system/

          # Reload systemd and restart
          sudo systemctl enable jobs
          sudo systemctl enable thruster

          sudo systemctl daemon-reload

          sudo systemctl restart jobs
          sudo systemctl restart thruster