name: Deploy to Production
on:
  push:
    branches: [ prod ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Install Kamal
      run: gem install kamal --user-install

    - name: Prepare deployment environment
      run: |
        # Set up SSH directory with proper permissions
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        # Configure SSH to use our key and not strict host checking
        echo "Host starchapp.com" >> ~/.ssh/config
        echo "  IdentityFile ~/.ssh/deploy_key" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
      
    - name: Deploy to server
      env:
        RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      uses: appleboy/ssh-action@master
      with:
        host: starchapp.com
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          kamal deploy