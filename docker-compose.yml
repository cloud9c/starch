services:
  typesense:
    image: typesense/typesense:27.1
    restart: on-failure
    ports:
      - "8108:8108"
    volumes:
      - ./tmp/typesense-data:/data
    command: '--data-dir /data --api-key=xyz --enable-cors'
  reading_parser:
    build: ./reading_parser
    restart: on-failure
    ports:
      - "3001:3001"
    volumes:
      - ./reading_parser:/app
    command: 'pnpm start'