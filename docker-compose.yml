services:
  typesense:
    image: typesense/typesense:27.1
    restart: on-failure
    ports:
      - "8108:8108"
    volumes:
      - ./tmp/typesense-data:/data
    command: '--data-dir /data --api-key=xyz --enable-cors'
  reading-parser:
    build: ./reading_parser
    restart: on-failure
    ports:
      - "3001:3001"
    volumes:
      - ./reading_parser:/app
    command: 'pnpm start'
  web:
    image: ruby:3.4
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: 'bash -c "bundle install && bundle exec rails server -p 3000 -b 0.0.0.0"'
